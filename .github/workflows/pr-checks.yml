# ============================================================
# PR Checks — runs on every pull request to main
# Provides fast feedback without triggering a deployment.
# ============================================================

name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: "20.x"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Next.js build
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/submissions.db"

      - name: Verify build output
        run: |
          echo "Checking standalone output..."
          test -f .next/standalone/server.js && echo "✅ server.js found" || (echo "❌ server.js missing" && exit 1)
          test -d .next/static && echo "✅ static assets found" || (echo "❌ static folder missing" && exit 1)

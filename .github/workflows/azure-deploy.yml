# ============================================================
# CI/CD Pipeline — InsureFlow Broker Portal
# Platform: GitHub Actions → Azure App Service
# ============================================================
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#
#   AZURE_WEBAPP_NAME            App Service name (e.g. "insureflow-demo")
#   AZURE_WEBAPP_PUBLISH_PROFILE Download from Azure Portal → App Service → Get publish profile
#   DATABASE_URL                 PostgreSQL connection string (see DEPLOYMENT_GUIDE.md)
#   NEXTAUTH_SECRET              Random 32+ char string — run: openssl rand -base64 32
#   NEXTAUTH_URL                 Full app URL e.g. https://insureflow-demo.azurewebsites.net
#   OPENAI_API_KEY               OpenAI key for Help Navigator + change-answer features
#
# OPTIONAL SECRETS (email sending — leave out to use Ethereal test mode):
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM
# ============================================================

name: CI / Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BUILD
  # Runs on every push and every PR.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build Next.js (standalone output)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:pass@localhost:5432/db' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'build-time-placeholder' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'build-time-placeholder' }}

      # Assemble the deployment package from the standalone output.
      # standalone/ already contains a trimmed node_modules — no npm install needed on Azure.
      - name: Assemble deployment package
        run: |
          mkdir -p deploy
          # Core Next.js standalone server
          cp -r .next/standalone/. deploy/
          # Static assets (CSS, JS chunks, images)
          mkdir -p deploy/.next/static
          cp -r .next/static/. deploy/.next/static/
          # Public folder (PWA manifest, icons, robots.txt, etc.)
          cp -r public/. deploy/public/
          # Prisma schema + migrations (needed for prisma migrate deploy on startup)
          mkdir -p deploy/prisma
          cp prisma/schema.prisma deploy/prisma/
          cp prisma/seed.js deploy/prisma/
          cp -r prisma/migrations deploy/prisma/migrations 2>/dev/null || true
          # Knowledge base documents for Help Navigator
          cp -r knowledge deploy/knowledge
          # Startup script
          cp startup.sh deploy/startup.sh
          chmod +x deploy/startup.sh

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-standalone
          path: deploy/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2: DEPLOY
  # Runs only when code is pushed/merged to main.
  # Skipped on PRs — PRs only run the build job above.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://insureflow-demo.azurewebsites.net

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-standalone
          path: ./deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy

      - name: Deployment summary
        run: |
          echo "✅ Deployed successfully"
          echo "🌐 URL: https://insureflow-demo.azurewebsites.net"
